experiment:
  name: model1_gemma_v1
  seed: 42
  task: model1

model:
  name: gemma-4-4b
  load_in_4bit: true
  torch_dtype: bfloat16

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules: auto

data:
  train_path: data/processed/model1_train.json
  val_path: data/processed/model1_val.json
  test_path: data/processed/model1_test.json
  image_dir: data/archive/unique_uis/combined
  max_image_size: 1024
  output_format: hybrid_json

training:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  warmup_steps: 100
  weight_decay: 0.01
  save_steps: 200
  eval_steps: 200
  logging_steps: 20
  max_grad_norm: 1.0
  use_unsloth: true

output:
  dir: outputs/checkpoints/model1_gemma_v1
  logging_dir: outputs/logs/model1_gemma_v1
  save_total_limit: 2
